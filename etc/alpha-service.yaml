openapi: 3.0.0
info:
  title: Simple API
  description: A simple API to demonstrate frontend-backend communication.
  version: 1.0.0

paths:
  /api/hello:
    get:
      summary: Returns a hello message.
      responses:
        '200':
          description: A JSON object containing a hello message.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Hello from FastAPI
